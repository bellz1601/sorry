<!DOCTYPE html>
<html>
<head>
  <title>ตรวจสอบเสาไฟ</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h2>ตรวจสอบสภาพเสาไฟฟ้าส่องสว่าง</h2>
  <form method="POST">
    <label>สายไฟ:</label>
    <input type="radio" name="wire" value="ไม่ชำรุด" required> ไม่ชำรุด
    <input type="radio" name="wire" value="ชำรุด"> ชำรุด<br>

    <label>โครงสร้างเสา:</label>
    <input type="radio" name="pole" value="ไม่ชำรุด" required> ไม่ชำรุด
    <input type="radio" name="pole" value="ชำรุด"> ชำรุด<br>

    <label>หลอดไฟ:</label>
    <input type="radio" name="light" value="ไม่ชำรุด" required> ไม่ชำรุด
    <input type="radio" name="light" value="ชำรุด"> ชำรุด<br><br>

    <button type="submit">บันทึก</button>
  </form>
  <a href="/logout">ออกจากระบบ</a>
</body>
</html>

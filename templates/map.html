{% extends "base.html" %}
{% block header %}แผนที่เสาไฟ{% endblock %}

{% block content %}

<!-- SEARCH -->
<div class="bg-white p-5 rounded-2xl shadow mb-6">
    <h2 class="font-semibold mb-3">🔍 ค้นหาเสาไฟ</h2>

    <div class="flex gap-2">
        <input id="search"
            placeholder="พิมพ์ชื่อเสา / tag / location"
            class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400">

        <!-- 🔥 ปุ่มล้าง -->
        <button id="clearSearch"
            class="px-4 bg-gray-500 text-white rounded-xl hover:bg-gray-600">
            ล้าง
        </button>
    </div>
</div>

<!-- MAP -->
<div class="bg-white p-4 rounded-2xl shadow">
    <div id="map" class="h-[500px] rounded-xl"></div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var defaultView = [14.97,102.08];
var defaultZoom = 13;

var map = L.map('map').setView(defaultView, defaultZoom);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 📍 GPS ผู้ใช้
navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    L.marker([lat,lng]).addTo(map).bindPopup("📍 คุณอยู่ที่นี่");
    map.setView([lat,lng],15);
});

// 📦 โหลดข้อมูล
var poles = {{ poles|tojson }};
var markers = [];

// 🔵 marker
poles.forEach(p=>{

    let lat = p.lat || p.latitude;
    let lng = p.lng || p.longitude;

    if(!lat || !lng) return;

    let m = L.marker([lat, lng])
        .addTo(map)
        .bindPopup(`
            <div style="font-family:Kanit; min-width:160px">
                <b>${p.pole_name || p.tag_id || "ไม่มีชื่อ"}</b><br>
                📍 ${p.location || "-"}<br>
                🏷 ${p.tag_id || "-"}
            </div>
        `);

    markers.push({
        data: p,
        marker: m
    });
});

// 🔍 ค้นหา
document.getElementById("search").addEventListener("input", function(){

    let keyword = this.value.toLowerCase();
    let found = false;

    markers.forEach(item=>{

        let text = (
            (item.data.pole_name || '') + ' ' +
            (item.data.tag_id || '') + ' ' +
            (item.data.location || '')
        ).toLowerCase();

        if(text.includes(keyword)){
            item.marker.addTo(map);

            if(!found && keyword){
                map.setView(item.marker.getLatLng(), 17);
                item.marker.openPopup();
                found = true;
            }

        } else {
            map.removeLayer(item.marker);
        }

    });

    // 🔥 ถ้าลบคำค้นหมด → reset map
    if(keyword === ""){
        resetMap();
    }
});

// 🔥 ปุ่มล้าง
document.getElementById("clearSearch").addEventListener("click", ()=>{
    document.getElementById("search").value = "";
    resetMap();
});

// 🔥 ฟังก์ชัน reset
function resetMap(){
    markers.forEach(item=>{
        item.marker.addTo(map);
    });

    map.setView(defaultView, defaultZoom);
}
</script>

{% endblock %}
